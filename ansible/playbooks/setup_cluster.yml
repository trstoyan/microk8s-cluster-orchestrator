---
- name: Setup MicroK8s cluster
  hosts: microk8s_nodes
  become: yes
  gather_facts: yes
  
  vars:
    control_plane_nodes: "{{ groups['microk8s_nodes'] | select('match', '.*control.*') | list }}"
    worker_nodes: "{{ groups['microk8s_nodes'] | difference(control_plane_nodes) | list }}"
    
  tasks:
    - name: Identify control plane node
      set_fact:
        is_control_plane: "{{ inventory_hostname == groups['microk8s_nodes'][0] or 'control' in inventory_hostname }}"

    - name: Ensure localhost IPv4 entry exists
      lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.0\.1\s+localhost(\s|$)'
        line: '127.0.0.1 localhost'
        create: yes
        insertafter: BOF

    - name: Ensure localhost IPv6 entry exists
      lineinfile:
        path: /etc/hosts
        regexp: '^::1\s+localhost(\s|$)'
        line: '::1 localhost ip6-localhost ip6-loopback'
        create: yes

    - name: Ensure local hostname entry exists
      lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.1\.1\s+'
        line: "127.0.1.1 {{ inventory_hostname }}"
        create: yes
    
    - name: Wait for MicroK8s to be ready
      command: microk8s status --wait-ready
      timeout: 300
      changed_when: false
    
    # Control plane setup
    - name: Enable HA on control plane (if HA is enabled)
      command: microk8s enable ha-cluster
      when: 
        - is_control_plane
        - ha_enabled | default(false)
        - groups['microk8s_nodes'] | length > 1
      register: ha_result
      changed_when: "'already enabled' not in ha_result.stdout"
    
    - name: Get cluster join token from control plane
      command: microk8s add-node
      register: join_token_output
      when: is_control_plane and groups['microk8s_nodes'] | length > 1
      changed_when: false
    
    - name: Determine preferred control plane join IP
      set_fact:
        preferred_join_ip: >-
          {{
            (
              ansible_all_ipv4_addresses
              | default([])
              | reject('equalto', '127.0.0.1')
              | reject('equalto', ansible_default_ipv4.address | default(''))
              | list
              | first
            )
            | default(ansible_default_ipv4.address | default(''), true)
          }}
      when: is_control_plane and groups['microk8s_nodes'] | length > 1

    - name: Ensure control plane API advertises cluster IP
      lineinfile:
        path: /var/snap/microk8s/current/args/kube-apiserver
        regexp: '^--advertise-address=.*$'
        line: "--advertise-address={{ preferred_join_ip }}"
      when: is_control_plane and groups['microk8s_nodes'] | length > 1
      register: control_plane_advertise_address

    - name: Restart control plane kubelite after advertise address update
      systemd:
        name: snap.microk8s.daemon-kubelite
        state: restarted
      when:
        - is_control_plane
        - groups['microk8s_nodes'] | length > 1
        - control_plane_advertise_address.changed

    - name: Wait for Kubernetes service endpoint to include control plane cluster IP
      command: microk8s kubectl get endpoints kubernetes -o jsonpath='{.subsets[0].addresses[*].ip}'
      register: kubernetes_service_endpoints
      retries: 30
      delay: 4
      until:
        - kubernetes_service_endpoints.rc == 0
        - preferred_join_ip in kubernetes_service_endpoints.stdout
      changed_when: false
      when: is_control_plane and groups['microk8s_nodes'] | length > 1

    - name: Extract join commands
      set_fact:
        join_commands: "{{ join_token_output.stdout_lines | select('match', 'microk8s join.*') | list }}"
      when: is_control_plane and groups['microk8s_nodes'] | length > 1

    - name: Select best join command
      set_fact:
        join_command: >-
          {{
            (
              join_commands
              | select('search', preferred_join_ip | default(''))
              | list
              | first
            )
            | default(join_commands | first)
          }}
      when: is_control_plane and groups['microk8s_nodes'] | length > 1
    
    - name: Get worker-specific join token from control plane
      command: microk8s add-node
      delegate_to: "{{ groups['microk8s_nodes'][0] }}"
      register: worker_join_token_output
      changed_when: false
      throttle: 1
      when: not is_control_plane and groups['microk8s_nodes'] | length > 1

    - name: Extract worker join commands
      set_fact:
        worker_join_commands: "{{ worker_join_token_output.stdout_lines | select('match', 'microk8s join.*') | list }}"
      throttle: 1
      when: not is_control_plane and groups['microk8s_nodes'] | length > 1

    - name: Select worker join command
      set_fact:
        worker_join_command: >-
          {{
            (
              (
                worker_join_commands
                | select('search', hostvars[groups['microk8s_nodes'][0]].preferred_join_ip | default(''))
                | list
                | first
              )
              | default(worker_join_commands | first)
            )
            ~ (
              '' if (
                (
                  worker_join_commands
                  | select('search', hostvars[groups['microk8s_nodes'][0]].preferred_join_ip | default(''))
                  | list
                  | first
                )
                | default(worker_join_commands | first)
              ) is search('--worker')
              else ' --worker'
            )
          }}
      throttle: 1
      when: not is_control_plane and groups['microk8s_nodes'] | length > 1
    
    # Worker nodes join
    - name: Join worker nodes to cluster
      command: "{{ worker_join_command }}"
      throttle: 1
      when: 
        - not is_control_plane
        - groups['microk8s_nodes'] | length > 1
        - worker_join_command is defined
      register: join_result
      changed_when: >-
        'already known to dqlite' not in
        ((join_result.stdout | default('')) ~ (join_result.stderr | default('')))
      failed_when: 
        - join_result.rc != 0
        - >-
          'already known to dqlite' not in
          ((join_result.stdout | default('')) ~ (join_result.stderr | default('')))

    - name: Disable worker API proxy endpoint auto-refresh for static lab topology
      lineinfile:
        path: /var/snap/microk8s/current/args/apiserver-proxy
        regexp: '^--refresh-interval\s+.*$'
        line: '--refresh-interval 0s'
      when:
        - not is_control_plane
        - groups['microk8s_nodes'] | length > 1

    - name: Force worker API proxy to use control plane cluster IP
      copy:
        dest: /var/snap/microk8s/current/args/traefik/provider.yaml
        mode: '0644'
        content: |
          tcp:
            routers:
              Router-1:
                rule: HostSNI(`*`)
                service: kube-apiserver
                tls:
                  passthrough: true
            services:
              kube-apiserver:
                loadBalancer:
                  servers:
                  - address: {{ hostvars[groups['microk8s_nodes'][0]].preferred_join_ip | default(hostvars[groups['microk8s_nodes'][0]].ansible_host) }}:16443
      when:
        - not is_control_plane
        - groups['microk8s_nodes'] | length > 1
      register: worker_proxy_config

    - name: Restart worker API proxy after join
      systemd:
        name: snap.microk8s.daemon-apiserver-proxy
        state: restarted
      when:
        - not is_control_plane
        - groups['microk8s_nodes'] | length > 1

    - name: Restart worker kubelite after join
      systemd:
        name: snap.microk8s.daemon-kubelite
        state: restarted
      when:
        - not is_control_plane
        - groups['microk8s_nodes'] | length > 1

    - name: Wait for worker local API proxy to respond
      uri:
        url: https://127.0.0.1:16443/healthz
        method: GET
        validate_certs: false
        status_code:
          - 200
          - 401
      register: worker_local_api_health
      retries: 12
      delay: 5
      until: worker_local_api_health.status in [200, 401]
      when:
        - not is_control_plane
        - groups['microk8s_nodes'] | length > 1

    - name: Wait for worker node registration on control plane
      command: "microk8s kubectl get node {{ inventory_hostname }} --no-headers"
      delegate_to: "{{ groups['microk8s_nodes'][0] }}"
      register: worker_registration
      retries: 18
      delay: 10
      until:
        - worker_registration.rc == 0
        - "' Ready ' in worker_registration.stdout"
      changed_when: false
      when:
        - not is_control_plane
        - groups['microk8s_nodes'] | length > 1
    
    # Enable addons on control plane
    - name: Enable DNS addon
      command: microk8s enable dns
      when: is_control_plane
      register: dns_result
      changed_when: "'already enabled' not in dns_result.stdout"
    
    - name: Enable storage addon
      command: microk8s enable storage
      when: is_control_plane
      register: storage_result
      changed_when: "'already enabled' not in storage_result.stdout"
    
    - name: Enable ingress addon
      command: microk8s enable ingress
      when: is_control_plane
      register: ingress_result
      changed_when: "'already enabled' not in ingress_result.stdout"
    
    - name: Enable dashboard addon
      command: microk8s enable dashboard
      when: is_control_plane
      register: dashboard_result
      changed_when: "'already enabled' not in dashboard_result.stdout"
    
    - name: Configure network CIDR (if specified)
      command: "microk8s kubectl patch configmap -n kube-system kube-proxy -p '{\"data\":{\"config.conf\":\"clusterCIDR: {{ network_cidr | default('10.1.0.0/16') }}\"}}}'"
      when: 
        - is_control_plane
        - network_cidr is defined
      failed_when: false
      changed_when: false
    
    # Wait for cluster to be ready
    - name: Wait for all nodes to be ready
      command: microk8s kubectl get nodes
      register: nodes_status
      until: 
        - nodes_status.stdout_lines | length >= groups['microk8s_nodes'] | length + 1
        - "'NotReady' not in nodes_status.stdout"
      retries: 30
      delay: 10
      when: is_control_plane
      changed_when: false
    
    - name: Get cluster status
      command: microk8s status
      register: final_status
      when: is_control_plane
      changed_when: false
    
    - name: Get cluster nodes
      command: microk8s kubectl get nodes -o wide
      register: cluster_nodes
      when: is_control_plane
      changed_when: false
    
    - name: Display cluster information
      debug:
        msg:
          - "Cluster setup completed!"
          - "Status: {{ final_status.stdout_lines }}"
          - "Nodes: {{ cluster_nodes.stdout_lines }}"
      when: is_control_plane
    
    - name: Create kubeconfig for external access
      command: microk8s config
      register: kubeconfig_content
      when: is_control_plane
      changed_when: false
    
    - name: Save kubeconfig to file
      copy:
        content: "{{ kubeconfig_content.stdout }}"
        dest: "/tmp/kubeconfig_{{ cluster_name | default('microk8s') }}"
        mode: '0600'
      when: is_control_plane
